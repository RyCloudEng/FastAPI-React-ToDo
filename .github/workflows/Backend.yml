name: Backend CI/CD

on:
  push:
    branches:
    - main
    paths:
    - Backend/**

jobs:
  build_and_push:
    runs-on: ubuntu-latest

    steps:
      - name: checkout repository
        uses: actions/checkout@v4
      
      - name: Build Dockerimage
        run: docker build -f Backend/Dockerfile -t backendimage Backend

      - name: push to registry (ECR)
        uses: jwalton/gh-ecr-push@v2
        with:
          access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          region: us-east-1
          local-image: backendimage:latest
          image: backend:latest
  deploy:      
    runs-on: ubuntu-latest
    needs: build_and_push
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - uses: tale/kubectl-action@v1
        with:
           base64-kube-config: ${{ secrets.KUBE_CONFIG }}
      - run: kubectl rollout restart deployment backend-deployment -n production 
          
