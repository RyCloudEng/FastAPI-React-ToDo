{{- if .Values.Secret.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "microservice.fullname" . }}
  labels:
    {{- include "microservice.labels" . | nindent 4 }}
stringData:
  {{- range $key, $value := .Values.Secret.stringData }}
  {{ $key }}: {{ $value }}
  {{- end }}
type: {{ .Values.Secret.type }}
{{- end }}
